<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดสรรหน้าที่แบบลากวาง + ระบบแชร์ลิงก์ออนไลน์</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .ghost { background-color: #dbeafe !important; border: 2px dashed #3b82f6 !important; opacity: 0.5; }
        .preset-active { background-color: #4f46e5 !important; color: white !important; font-weight: bold; border-color: #4f46e5 !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-6 font-sans">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl md:text-3xl font-bold mb-2 text-slate-800">ระบบจัดสรรหน้าที่แบบลากวาง (Drag & Drop)</h1>
        <p class="text-gray-500 mb-6 text-sm">💡 **วิธีใช้งาน:** จัดสรรงานตามต้องการ จากนั้นกดปุ่ม "คัดลอกลิงก์แผนงานนี้" เพื่อบันทึกหรือส่งต่อให้คนอื่นเปิดดูได้จากทุกที่!</p>
        
        <div class="p-4 bg-indigo-50 rounded-lg border border-indigo-200 shadow-sm mb-6">
            <div class="flex flex-col gap-4">
                <div>
                    <h2 class="font-semibold text-indigo-800 mb-2 text-sm">📋 เลือกแผนการ (Preset) ที่ต้องการจัดงาน</h2>
                    <div class="flex gap-2 max-w-md">
                        <button id="btn-preset1" onclick="switchPreset('preset1')" class="flex-1 py-1.5 px-3 bg-white text-slate-700 text-xs rounded-md border hover:bg-slate-100 transition-all shadow-xs">แผนการที่ 1</button>
                        <button id="btn-preset2" onclick="switchPreset('preset2')" class="flex-1 py-1.5 px-3 bg-white text-slate-700 text-xs rounded-md border hover:bg-slate-100 transition-all shadow-xs">แผนการที่ 2</button>
                        <button id="btn-preset3" onclick="switchPreset('preset3')" class="flex-1 py-1.5 px-3 bg-white text-slate-700 text-xs rounded-md border hover:bg-slate-100 transition-all shadow-xs">แผนการที่ 3</button>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-3 items-stretch sm:items-center border-t border-indigo-100 pt-3">
                    <button onclick="generateShareLink()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-lg text-sm font-medium transition-colors shadow-sm flex items-center justify-center gap-2">
                        🔗 คัดลอกลิงก์แผนงานนี้ (Save / Share ทั้ง 3 Presets)
                    </button>
                    <div class="flex-1 flex items-center gap-2 bg-white border rounded-lg px-3 py-2 text-xs text-gray-500 overflow-hidden text-ellipsis whitespace-nowrap">
                        <span class="font-bold text-indigo-600 shrink-0">ลิงก์ปัจจุบันของคุณ:</span>
                        <span id="currentUrlDisplay" class="italic select-all">กำลังโหลด...</span>
                    </div>
                </div>
            </div>
            <p id="shareStatus" class="text-xs text-emerald-600 mt-2 font-bold h-4"></p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="p-4 bg-blue-50 rounded-lg border border-blue-200 shadow-sm">
                <h2 class="font-semibold text-blue-800 mb-2">👤 เพิ่มรายชื่อคน</h2>
                <div class="flex gap-2">
                    <input type="text" id="personInput" placeholder="ชื่อพนักงาน..." class="flex-1 p-2 border rounded bg-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <button onclick="addPerson()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700 font-medium">เพิ่ม</button>
                </div>
            </div>

            <div class="p-4 bg-emerald-50 rounded-lg border border-emerald-200 shadow-sm">
                <h2 class="font-semibold text-emerald-800 mb-2">📋 เพิ่มตำแหน่ง/หน้าที่</h2>
                <div class="flex gap-2">
                    <input type="text" id="roleInput" placeholder="ชื่อหน้าที่ เช่น ทำบัญชี, ตรวจโค้ด..." class="flex-1 p-2 border rounded bg-white text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
                    <button onclick="addRole()" class="bg-emerald-600 text-white px-4 py-2 rounded text-sm hover:bg-emerald-700 font-medium">เพิ่ม</button>
                </div>
            </div>
        </div>

        <div id="board" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        </div>
    </div>

    <script>
        // ข้อมูลตั้งต้นมาตรฐาน (ห้ามหาย)
        const defaultPeople = [
            { id: 'p1', name: 'สมชาย (Developer)' },
            { id: 'p2', name: 'สมหญิง (Marketing)' },
            { id: 'unassigned', name: '📥 ยังไม่ได้มอบหมาย' }
        ];

        const defaultRoles = [
            { id: 'r1', title: 'เขียนโค้ด Frontend', personId: 'p1' },
            { id: 'r2', title: 'ยิงแอดโฆษณา Facebook', personId: 'p2' },
            { id: 'r3', title: 'ออกแบบกราฟิก', personId: 'p1' },
            { id: 'r4', title: 'เขียนบทความ Content', personId: 'unassigned' }
        ];

        let people = [];
        let roles = [];
        let allPresets = {};
        let currentPresetKey = 'preset1'; 

        // ฟังก์ชันโหลดข้อมูล และตรวจจับค่าว่างเพื่อดึงช่องกลับมา
        function loadDataFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const dataParam = urlParams.get('data');
            
            if (dataParam) {
                try {
                    allPresets = JSON.parse(decodeURIComponent(atob(dataParam)));
                    
                    // ป้องกันขั้นสุด: ถ้าเปิดลิงก์มาแล้วพบว่าวัตถุภายในโล่ง ให้รีเซ็ตกลับเป็นค่าเริ่มต้นทันที
                    if (!allPresets.preset1 || allPresets.preset1.people.length === 0) {
                        loadDefaultPresets();
                    }
                } catch (e) {
                    console.error("การโหลดข้อมูลจากลิงก์ผิดพลาด:", e);
                    loadDefaultPresets();
                }
            } else {
                loadDefaultPresets();
            }
            document.getElementById('currentUrlDisplay').innerText = window.location.href;
            loadPresetToBoard(currentPresetKey);
        }

        function loadDefaultPresets() {
            allPresets = {
                preset1: { people: JSON.parse(JSON.stringify(defaultPeople)), roles: JSON.parse(JSON.stringify(defaultRoles)) },
                preset2: { people: JSON.parse(JSON.stringify(defaultPeople)), roles: JSON.parse(JSON.stringify(defaultRoles)) },
                preset3: { people: JSON.parse(JSON.stringify(defaultPeople)), roles: JSON.parse(JSON.stringify(defaultRoles)) }
            };
        }

        function switchPreset(presetKey) {
            // เซฟงานปัจจุบันเก็บเข้าถังก่อนสลับหน้า
            allPresets[currentPresetKey] = {
                people: JSON.parse(JSON.stringify(people)),
                roles: JSON.parse(JSON.stringify(roles))
            };

            currentPresetKey = presetKey;
            loadPresetToBoard(presetKey);
        }

        function loadPresetToBoard(presetKey) {
            // ดึงข้อมูลมากาง และตรวจสอบว่ามีช่อง "ยังไม่ได้มอบหมาย" หรือไม่ ถ้าไม่มีให้เติมกลับเข้าท้ายตารางเสมอ
            people = [...allPresets[presetKey].people];
            roles = [...allPresets[presetKey].roles];

            const hasUnassigned = people.some(p => p.id === 'unassigned');
            if (!hasUnassigned) {
                people.push({ id: 'unassigned', name: '📥 ยังไม่ได้มอบหมาย' });
            }

            // ไฮไลต์ปุ่มที่เลือก
            document.getElementById('btn-preset1').className = `flex-1 py-1.5 px-3 bg-white text-slate-700 text-xs rounded-md border hover:bg-slate-100 transition-all shadow-xs ${presetKey === 'preset1' ? 'preset-active' : ''}`;
            document.getElementById('btn-preset2').className = `flex-1 py-1.5 px-3 bg-white text-slate-700 text-xs rounded-md border hover:bg-slate-100 transition-all shadow-xs ${presetKey === 'preset2' ? 'preset-active' : ''}`;
            document.getElementById('btn-preset3').className = `flex-1 py-1.5 px-3 bg-white text-slate-700 text-xs rounded-md border hover:bg-slate-100 transition-all shadow-xs ${presetKey === 'preset3' ? 'preset-active' : ''}`;

            renderBoard();
        }

        function generateShareLink() {
            allPresets[currentPresetKey] = {
                people: JSON.parse(JSON.stringify(people)),
                roles: JSON.parse(JSON.stringify(roles))
            };

            const base64Data = btoa(encodeURIComponent(JSON.stringify(allPresets)));
            const newUrl = window.location.origin + window.location.pathname + '?data=' + base64Data;
            
            navigator.clipboard.writeText(newUrl).then(() => {
                document.getElementById('currentUrlDisplay').innerText = newUrl;
                const statusEl = document.getElementById('shareStatus');
                statusEl.innerText = "📋 คัดลอกลิงก์แผนงานนี้ลงเครื่องเรียบร้อย! (เซฟรวมครบทั้ง 3 แผนการแล้ว)";
                setTimeout(() => { statusEl.innerText = ''; }, 4000);
            }).catch(err => {
                alert("ไม่สามารถคัดลอกอัตโนมัติได้ กรุณาก๊อปปี้ลิงก์ในช่องสีขาวแทนครับ");
            });
        }

        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = ''; 

            people.forEach(person => {
                const personRoles = roles.filter(role => role.personId === person.id);
                const isUnassigned = person.id === 'unassigned';
                
                const personBox = document.createElement('div');
                personBox.className = `p-4 rounded-xl border-2 shadow-sm ${isUnassigned ? 'bg-gray-100 border-dashed border-gray-400' : 'bg-white border-slate-200'}`;
                
                const deletePersonBtn = !isUnassigned 
                    ? `<button onclick="deletePerson('${person.id}')" class="text-xs bg-red-50 hover:bg-red-100 text-red-500 px-2 py-1 rounded-md border border-red-200 transition-colors">❌ ลบคน</button>` 
                    : '';

                personBox.innerHTML = `
                    <h3 class="font-bold text-base border-b pb-2 mb-3 flex justify-between items-center text-slate-700">
                        <div class="flex items-center gap-2">
                            <span>${person.name}</span>
                            <span class="text-xs bg-slate-200 px-2 py-1 rounded-full text-slate-600">${personRoles.length} หน้าที่</span>
                        </div>
                        ${deletePersonBtn}
                    </h3>
                    <div id="list-${person.id}" data-person-id="${person.id}" class="space-y-2 min-h-[150px] bg-slate-50/50 p-2 rounded-lg target-list">
                        ${personRoles.map(role => `
                            <div data-role-id="${role.id}" class="p-3 bg-amber-100 hover:bg-amber-200 border border-amber-300 rounded-lg shadow-sm cursor-grab active:cursor-grabbing flex justify-between items-center transition-colors duration-150">
                                <span class="font-medium text-slate-800 text-sm">⚡ ${role.title}</span>
                                <div class="flex items-center gap-2">
                                    <button onclick="deleteRole('${role.id}')" class="text-xs text-red-500 hover:text-red-700 font-bold bg-white/60 hover:bg-white px-1.5 py-0.5 rounded border border-amber-200 shadow-xs transition-colors" title="ลบหน้าที่นี้">❌</button>
                                    <span class="text-gray-400 text-xs pointer-events-none">☰</span>
                                </div>
                            </div>
                        `).join('')}
                        ${personRoles.length === 0 ? `<div class="text-center text-gray-400 text-xs py-8 pointer-events-none no-fallback">ลากหน้าที่มาวางที่นี่</div>` : ''}
                    </div>
                `;

                board.appendChild(personBox);

                const listEl = document.getElementById(`list-${person.id}`);
                new Sortable(listEl, {
                    group: 'sharedRoles',
                    animation: 150,
                    ghostClass: 'ghost',
                    onAdd: function (evt) {
                        const roleId = evt.item.getAttribute('data-role-id');
                        const targetPersonId = evt.to.getAttribute('data-person-id');
                        
                        const role = roles.find(r => r.id === roleId);
                        if (role) role.personId = targetPersonId;
                        
                        renderBoard();
                    }
                });
            });
        }

        function addPerson() {
            const input = document.getElementById('personInput');
            const name = input.value.trim();
            if (!name) return;
            
            // เพิ่มคนใหม่โดยแทรกไว้ก่อนหน้าช่อง "ยังไม่ได้มอบหมาย" เสมอ
            people.splice(people.length - 1, 0, { id: 'p_' + Date.now(), name: name });
            input.value = '';
            renderBoard();
        }

        function addRole() {
            const input = document.getElementById('roleInput');
            const title = input.value.trim();
            if (!title) return;

            roles.push({ id: 'r_' + Date.now(), title: title, personId: 'unassigned' });
            input.value = '';
            renderBoard();
        }

        function deletePerson(personId) {
            if (confirm("คุณแน่ใจใช่ไหมที่จะลบคนนี้? (หน้าที่ทั้งหมดของคนนี้จะถูกเด้งกลับไปที่ช่องยังไม่ได้มอบหมาย)")) {
                roles.forEach(role => {
                    if (role.personId === personId) {
                        role.personId = 'unassigned';
                    }
                });
                people = people.filter(p => p.id !== personId);
                renderBoard();
            }
        }

        function deleteRole(roleId) {
            if (confirm("คุณต้องการลบหน้าที่นี้ทิ้งใช่ไหม?")) {
                roles = roles.filter(r => r.id !== roleId);
                renderBoard();
            }
        }

        loadDataFromUrl();
    </script>
</body>
</html>
